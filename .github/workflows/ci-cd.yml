name: Auth Service CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run tests
        run: mvn test

      - name: Build JAR
        run: mvn package -DskipTests

      - name: Build Docker image
        run: docker build -t shopzone-auth-service .

      - name: Login to AWS ECR
        uses: aws-actions/amazon-ecr-login@v1
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1

      - name: Push to ECR
        run: |
          docker tag shopzone-auth-service ${{ secrets.ECR_REGISTRY }}/shopzone-auth-service:latest
          docker push ${{ secrets.ECR_REGISTRY }}/shopzone-auth-service:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.ECR_REGISTRY }}/shopzone-auth-service:latest
            docker stop shopzone-auth || true
            docker rm shopzone-auth || true
            docker run -d --name shopzone-auth -p 8081:8081 ${{ secrets.ECR_REGISTRY }}/shopzone-auth-service:latest